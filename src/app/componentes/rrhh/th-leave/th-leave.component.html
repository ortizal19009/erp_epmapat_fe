<div class="container-fluid mt-2">
  <h5>TH Leave</h5>

  <div class="alert alert-success py-1" *ngIf="msg">{{ msg }}</div>
  <div class="alert alert-danger py-1" *ngIf="error">{{ error }}</div>

  <div class="row mb-2">
    <div class="col-sm-5">
      <select class="form-control form-control-sm" [(ngModel)]="idpersonal" (change)="cargar()">
        <option [ngValue]="0">Seleccione personal...</option>
        <option *ngFor="let p of personalList" [ngValue]="p.idpersonal">
          {{ p.apellidos }}, {{ p.nombres }} - {{ p.identificacion }}
        </option>
      </select>
    </div>
    <div class="col-sm-2"><button class="btn btn-sm btn-primary" (click)="cargar()">Cargar</button></div>
  </div>

  <div class="card p-2 mb-2">
    <h6>Crear Balance</h6>
    <div class="row">
      <div class="col-sm-2"><input class="form-control form-control-sm" type="number" [(ngModel)]="balanceModel.anio"></div>
      <div class="col-sm-2"><input class="form-control form-control-sm" type="number" [(ngModel)]="balanceModel.dias_asignados"></div>
      <div class="col-sm-2"><button class="btn btn-sm btn-success" (click)="crearBalance()">Guardar</button></div>
    </div>
  </div>

  <div class="card p-2 mb-2">
    <h6>Crear Solicitud</h6>
    <div class="row">
      <div class="col-sm-2"><select class="form-control form-control-sm" [(ngModel)]="requestModel.tipolicencia"><option>VACACION</option><option>PERMISO</option><option>LICENCIA</option></select></div>
      <div class="col-sm-2"><input class="form-control form-control-sm" type="date" [(ngModel)]="requestModel.fechainicio"></div>
      <div class="col-sm-2"><input class="form-control form-control-sm" type="date" [(ngModel)]="requestModel.fechafin"></div>
      <div class="col-sm-3"><input class="form-control form-control-sm" [(ngModel)]="requestModel.motivo" placeholder="Motivo"></div>
      <div class="col-sm-2"><button class="btn btn-sm btn-success" (click)="crearRequest()">Solicitar</button></div>
    </div>
  </div>

  <div class="row">
    <div class="col-sm-6">
      <h6>Balances</h6>
      <table class="table table-sm table-bordered"><thead><tr><th>Año</th><th>Asignados</th><th>Usados</th><th>Disponibles</th></tr></thead>
      <tbody><tr *ngFor="let b of balances"><td>{{b.anio}}</td><td>{{b.dias_asignados}}</td><td>{{b.dias_usados}}</td><td>{{b.dias_disponibles}}</td></tr></tbody></table>
    </div>
    <div class="col-sm-6">
      <h6>Solicitudes</h6>
      <table class="table table-sm table-bordered"><thead><tr><th>ID</th><th>Tipo</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        <tr *ngFor="let r of requests">
          <td>{{r.idrequest}}</td><td>{{r.tipolicencia}}</td><td>{{r.estado}}</td>
          <td>
            <button class="btn btn-sm btn-success mr-1" (click)="aprobar(r.idrequest)" [disabled]="r.estado !== 'SOLICITADA'">Aprobar</button>
            <button class="btn btn-sm btn-danger" (click)="rechazar(r.idrequest)" [disabled]="r.estado !== 'SOLICITADA'">Rechazar</button>
          </td>
        </tr>
      </tbody></table>
    </div>
  </div>
</div>
