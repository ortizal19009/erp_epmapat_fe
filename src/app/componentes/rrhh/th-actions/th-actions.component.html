<div class="container-fluid mt-2">
  <h5>TH Actions</h5>

  <div class="alert alert-success py-1" *ngIf="msg">{{ msg }}</div>
  <div class="alert alert-danger py-1" *ngIf="error">{{ error }}</div>

  <div class="row mb-2">
    <div class="col-sm-5">
      <select class="form-control form-control-sm" [(ngModel)]="idpersonal" (change)="buscar()">
        <option [ngValue]="0">Seleccione personal...</option>
        <option *ngFor="let p of personalList" [ngValue]="p.idpersonal">
          {{ p.apellidos }}, {{ p.nombres }} - {{ p.identificacion }}
        </option>
      </select>
    </div>
    <div class="col-sm-2">
      <button class="btn btn-sm btn-primary" (click)="buscar()">Buscar</button>
    </div>
  </div>

  <div class="card p-2 mb-3">
    <div class="row">
      <div class="col-sm-2">
        <select class="form-control form-control-sm" [(ngModel)]="model.tipoaccion">
          <option>INGRESO</option><option>MOVIMIENTO</option><option>ENCARGO</option>
          <option>SUBROGACION</option><option>DESVINCULACION</option><option>REINCORPORACION</option>
        </select>
      </div>
      <div class="col-sm-3"><input class="form-control form-control-sm" [(ngModel)]="model.motivo" placeholder="Motivo"></div>
      <div class="col-sm-3"><input class="form-control form-control-sm" [(ngModel)]="model.observacion" placeholder="Observación"></div>
      <div class="col-sm-2"><input class="form-control form-control-sm" type="date" [(ngModel)]="model.fecvigencia"></div>
      <div class="col-sm-2"><button class="btn btn-sm btn-success" (click)="guardar()">Guardar</button></div>
    </div>
  </div>

  <div *ngIf="loading" class="small text-muted">Cargando...</div>

  <table class="table table-sm table-bordered" *ngIf="!loading">
    <thead><tr><th>ID</th><th>Tipo</th><th>Vigencia</th><th>Motivo</th><th>Estado</th></tr></thead>
    <tbody>
      <tr *ngFor="let a of acciones">
        <td>{{a.idaction}}</td><td>{{a.tipoaccion}}</td><td>{{a.fecvigencia}}</td><td>{{a.motivo}}</td><td>{{a.estado}}</td>
      </tr>
    </tbody>
  </table>
</div>
