<div class="content-header">
   <div class="container-fluid">
      <div class="row mt-3 justify-content-center text-center">
         <div class="col-sm-7 cabecera border sombra">
            <h5 class="font-weight-bold mt-2 mb-1 py-0">Modificar Partida de Gastos</h5>
            <div *ngIf="movimientos" class="alert alert-warning px-1 py-0 mb-1 robotosmall border" role="alert">
               <strong>Advertencia:</strong> Tiene registrado movimientos
            </div>
         </div>
      </div>
   </div>
</div>

<div class="content">
   <div class="container-fluid">
      <div class="row justify-content-center">
         <div class="card card-body col-sm-7 detalle sombra">
            <form [formGroup]="formPregasto">
               <div class="row">

                  <div class="form-group col-md-4">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <label class="input-group-text">Actividad</label>
                        </div>
                        <input type="text" class="form-control form-control-sm" formControlName="codacti"
                           list="actividadList" (input)="listaActividades($event)" required minlength="2" maxlength="2"
                           [ngClass]="{'is-invalid': f['codacti'].invalid && f['codacti'].touched,
                        'is-valid': f['codacti'].valid, '': f['codacti'].untouched}">
                        <datalist role="listbox" id="actividadList">
                           <option *ngFor=" let actividad of actividades" value={{actividad.codigo}}>
                              {{ actividad.nombre}}</option>
                        </datalist>
                     </div>
                  </div>

                  <div class="form-group col-md-12">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <label class="input-group-text">Partida Clasificador</label>
                        </div>
                        <input type="text" class="form-control form-control-sm col-sm-2" formControlName="codpart"
                           list="clasifiList" (input)="listaClasificador($event)" required minlength="8" maxlength="8"
                           [ngClass]="{'is-invalid': f['codpart'].invalid && f['codpart'].touched,
                        'is-valid': f['codpart'].valid, '': f['codpart'].untouched}">
                        <datalist role="listbox" id="clasifiList">
                           <option *ngFor="let clasifi of clasificador" value={{clasifi.codpar}}>
                              {{ clasifi.nompar}}</option>
                        </datalist>
                        <input type="text" class="form-control form-control-sm" formControlName="nomcla" readonly tabindex="-1">
                     </div>
                  </div>

                  <div class="form-group col-md-5">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <span class="input-group-text font-weight-bold">Código</span>
                        </div>
                        <input type="text" class="form-control" formControlName="codpar" required minlength="17"
                           maxlength="17" [ngClass]="{'is-invalid': f['codpar'].invalid && f['codpar'].touched,
                      'is-valid': f['codpar'].valid, '': f['codpar'].untouched}">
                     </div>
                  </div>

                  <div class="form-group col-md-12">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <span class="input-group-text font-weight-bold">Nombre</span>
                        </div>
                        <input type="text" class="form-control" formControlName="nompar" [ngClass]="{'is-invalid': f['nompar'].invalid && f['nompar'].touched,
                     'is-valid': f['nompar'].valid, '': f['nompar'].untouched}">
                     </div>
                  </div>

                  <div class="form-group col-md-4">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <label class="input-group-text">Inicial</label>
                        </div>
                        <input type="text" class="form-control text-right" formControlName="inicia" min="0"
                           [ngClass]="{'is-invalid': f['inicia'].invalid && f['inicia'].touched,'is-valid': f['inicia'].valid, '': f['inicia'].untouched}"
                           appVisualFormat [minDecimals]="2" [maxDecimals]="2">
                     </div>
                  </div>

                  <div class="form-group col-md-4">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <label class="input-group-text">Reformas</label>
                        </div>
                        <input type="text" class="form-control text-right" formControlName="totmod" readonly
                           tabindex="-1" appVisualFormat [minDecimals]="2">
                     </div>
                  </div>

                  <div class="form-group col-md-4">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <label class="input-group-text">Codificado</label>
                        </div>
                        <input type="text" class="form-control text-right" formControlName="codificado" appVisualFormat
                           [minDecimals]="2" readonly tabindex="-1">
                     </div>
                  </div>

                  <div class="form-group col-md-3">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <span class="input-group-text font-weight-bold">Plurianual </span>
                           <div class="input-group-text">
                              <input type="checkbox" formControlName="swpluri">
                           </div>
                        </div>
                     </div>
                  </div>

                  <div class="form-group col-md-5">
                     <div class="input-group input-group-sm">
                        <div class="input-group-prepend">
                           <label class="input-group-text">Cuentas asociadas</label>
                        </div>
                        <div class="input-group-append">
                           <button type="button" class="btn btn-info btn-xs dropdown-toggle py-0 ml-0"
                              data-toggle="dropdown" aria-expanded="false" (click)="cuentasAsociadas()">
                           </button>
                           <div class="dropdown-menu dropdown-menu-left dropdownApp">
                              <button class="dropdown-item" type="button" *ngFor="let aso of asocuentas">
                                 {{ aso.codcue + ' ' + aso.nomcue }}
                              </button>
                           </div>
                        </div>
                     </div>
                  </div>

               </div>
            </form>

            <div class="text-center">
               <button class="btn btn-success btn-sm mx-1 mt-1"
                  [disabled]="formPregasto.pristine || !formPregasto.valid" (click)="actualizar()">
                  <i class="fa fa-check-circle"></i>&nbsp; Aceptar</button>
               <button class="btn btn-outline-success btn-sm mx-1 mt-1" (click)="regresar()"><i
                     class="fa fa-times-circle"></i> Cancelar</button>
            </div>

         </div>
      </div>
   </div>
</div>
