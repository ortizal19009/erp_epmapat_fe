<div class="page gd-page">
  <div class="page gd-page-header d-flex justify-content-between align-items-center mb-3">
    <div>
      <h2 class="mb-0">{{ title }}</h2>
      <small class="text-muted">Gestión documental · {{ id ? 'edición' : 'creación' }} <span *ngIf="id">· Estado: {{ currentState }}</span></small>
    </div>
    <button class="btn btn-outline-secondary" (click)="cancel()">Volver</button>
  </div>

  <div *ngIf="loading" class="alert alert-info">Cargando...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <form *ngIf="!loading" [formGroup]="form" class="card shadow-sm border-0" (ngSubmit)="save()">
    <div class="card-header bg-light py-2">
      <strong>Cabecera del documento</strong>
    </div>
    <div class="card-body">
    <div class="row">
      <div class="col-md-4">
        <label class="d-block mb-1 text-muted">Tipo de documento</label>
        <select class="custom-select" formControlName="tipo_doc_id">
          <option value="">Seleccione...</option>
          <option *ngFor="let t of docTypes" [value]="t.id">{{ t.codigo }} - {{ t.nombre }}</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="d-block mb-1 text-muted">Dependencia emisora</label>
        <select class="custom-select" formControlName="dependencia_emisora_id">
          <option value="">Seleccione...</option>
          <option *ngFor="let d of dependencies" [value]="d.id">{{ d.codigo }} - {{ d.nombre }}</option>
        </select>
      </div>

      <div class="col-md-2">
        <label class="d-block mb-1 text-muted">Flujo</label>
        <select class="custom-select" formControlName="flujo">
          <option value="INGRESO">INGRESO</option>
          <option value="SALIDA">SALIDA</option>
        </select>
      </div>

      <div class="col-md-2">
        <label class="d-block mb-1 text-muted">Prioridad</label>
        <select class="custom-select" formControlName="prioridad">
          <option value="BAJA">BAJA</option>
          <option value="MEDIA">MEDIA</option>
          <option value="ALTA">ALTA</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="d-block mb-1 text-muted">Serie</label>
        <select class="custom-select" formControlName="series_id" (change)="onSeriesChange()">
          <option value="">Sin serie</option>
          <option *ngFor="let s of series" [value]="s.id">{{ s.codigo }} - {{ s.nombre }}</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="d-block mb-1 text-muted">Subserie</label>
        <select class="custom-select" formControlName="subseries_id">
          <option value="">Sin subserie</option>
          <option *ngFor="let s of subseries" [value]="s.id">{{ s.codigo }} - {{ s.nombre }}</option>
        </select>
      </div>

      <div class="col-md-2">
        <label class="d-block mb-1 text-muted">F. elaboración</label>
        <input type="date" class="form-control" formControlName="fecha_elaboracion" />
      </div>

      <div class="col-md-2">
        <label class="d-block mb-1 text-muted">F. plazo</label>
        <input type="date" class="form-control" formControlName="fecha_plazo" />
      </div>

      <div class="col-12">
        <label class="d-block mb-1 text-muted">Asunto</label>
        <input class="form-control" formControlName="asunto" maxlength="250" />
      </div>

      <div class="col-12">
        <label class="d-block mb-1 text-muted">Referencia</label>
        <input class="form-control" formControlName="referencia" maxlength="120" />
      </div>

      <div class="col-md-4">
        <label class="d-block mb-1 text-muted">Origen</label>
        <select class="custom-select" formControlName="origen">
          <option value="INTERNO">INTERNO</option>
          <option value="EXTERNO">EXTERNO</option>
        </select>
      </div>

      <div class="col-md-4 d-flex align-items-end">
        <div class="form-check mb-2">
          <input id="reqResp" type="checkbox" class="form-check-input" formControlName="requiere_respuesta" />
          <label for="reqResp" class="form-check-label">Requiere respuesta</label>
        </div>
      </div>
    </div>

    <div class="text-right mt-4">
      <button type="button" class="btn btn-outline-secondary mr-2" (click)="cancel()">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="saving || (!id && !canCreate()) || (id && !canEditByState())">{{ saving ? 'Guardando...' : 'Guardar' }}</button>
    </div>
    </div>
  </form>
</div>
