<div class="page">
  <div class="page-header"><div class="d-flex align-items-center"><h2 class="page-title mb-0">TRD (Retención)</h2><app-info-help key="trd"></app-info-help></div></div>
  <div class="page-card mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-3"><label class="form-label">Serie</label><select class="form-select" [(ngModel)]="model.series_id" (ngModelChange)="onSeriesChange()"><option value="">Seleccione</option><option *ngFor="let s of series" [value]="s.id">{{ s.code }} - {{ s.name }}</option></select></div>
      <div class="col-md-3"><label class="form-label">Subserie</label><select class="form-select" [(ngModel)]="model.subseries_id"><option value="">(ninguna)</option><option *ngFor="let ss of subseries" [value]="ss.id">{{ ss.code }} - {{ ss.name }}</option></select></div>
      <div class="col-md-2"><label class="form-label">Años activos</label><input type="number" class="form-control" [(ngModel)]="model.active_years" /></div>
      <div class="col-md-2"><label class="form-label">Años semiactivos</label><input type="number" class="form-control" [(ngModel)]="model.semi_active_years" /></div>
      <div class="col-md-2"><label class="form-label">Disposición</label><select class="form-select" [(ngModel)]="model.final_disposition"><option>CONSERVAR</option><option>TRANSFERIR</option><option>ELIMINAR</option></select></div>
      <div class="col-md-10"><label class="form-label">Base legal</label><input class="form-control" [(ngModel)]="model.legal_basis" /></div>
      <div class="col-md-2 d-grid"><button class="btn btn-primary" (click)="save()">Guardar</button></div>
    </div>
  </div>

  <div class="page-card p-0 overflow-hidden">
    <div class="table-wrap">
      <table class="table table-sm align-middle mb-0">
        <thead><tr><th>Serie</th><th>Subserie</th><th>Activos</th><th>Semiactivos</th><th>Disposición</th><th>Base legal</th></tr></thead>
        <tbody>
          <tr *ngFor="let r of rows"><td>{{ r.series_code }} - {{ r.series_name }}</td><td>{{ r.subseries_code || '-' }} {{ r.subseries_name || '' }}</td><td>{{ r.active_years }}</td><td>{{ r.semi_active_years }}</td><td>{{ r.final_disposition }}</td><td>{{ r.legal_basis }}</td></tr>
          <tr *ngIf="rows.length===0"><td colspan="6" class="text-center text-muted py-3">Sin reglas TRD</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
